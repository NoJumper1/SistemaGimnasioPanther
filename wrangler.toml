name = "panther-zone-gym"
main = "dist/worker.js"
compatibility_date = "2025-06-21"
compatibility_flags = ["nodejs_compat"]

# Static assets (CSS, JS, images del directorio public/)
[assets]
directory = "./src/public"
binding = "ASSETS"

# D1 SQLite
[[d1_databases]]
binding = "DB"
database_name = "gimnasio"
database_id = "2f988e66-9076-458f-8853-e06366fda9dc"

# R2 Object Storage
[[r2_buckets]]
binding = "R2"
bucket_name = "panther-gym-assets"

# KV Namespace (tokens Spotify + caché)
[[kv_namespaces]]
binding = "KV"
id = "c6411b5080c24df99354eab3b952325c"

# Secretos — configurar con:
#   wrangler secret put JWT_SECRET
#   wrangler secret put SPOTIFY_CLIENT_ID
#   wrangler secret put SPOTIFY_CLIENT_SECRET
#   wrangler secret put SPOTIFY_REDIRECT_URI
